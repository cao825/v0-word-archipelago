name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly, off-peak. Monday 07:23 UTC — staggered from OSV-Scanner's
    # Wednesday slot so the two security scans don't contend for runners.
    - cron: "23 7 * * 1"

permissions:
  # security-events: write to upload SARIF results to the Security > Code
  # Scanning tab. contents/actions: read are required by the CodeQL action
  # to check out the repo and read workflow run metadata.
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      # SHA-pinned (this repo pins actions; the sibling scanner workflows still
      # float to tags — pinning here per the no-floating-tags convention. Bumped
      # by the github-actions Dependabot ecosystem already configured.)
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # build-mode: none — JS/TS is interpreted, so CodeQL extracts directly
      # from source with no compilation step (no autobuild needed).
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: javascript-typescript
          build-mode: none
          # security-extended: the full security query suite (broader coverage
          # than the default suite) without the noise of the code-quality queries.
          queries: security-extended
          # Next.js build output (.next/out) and the jest suite are excluded from
          # analysis (the Vite siblings exclude `dist` + tests; this is the
          # Next/pnpm equivalent).
          config: |
            paths-ignore:
              - .next
              - out
              - '**/__tests__/**'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:javascript-typescript"
