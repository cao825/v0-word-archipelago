name: Claude PR Review & Merge

on:
  pull_request:
    # `ready_for_review` is a deliberate divergence from ClawApp parity (shared
    # across the fleet): visual PRs open as DRAFT, get playtested, then are
    # marked "Ready for review" — that transition fires this trigger so the
    # auto-merge runs hands-off. (Drafts still can't be merged: GitHub blocks
    # merging a draft PR, so `gh pr merge` no-ops until the PR is ready.)
    types: [opened, synchronize, ready_for_review]
    # Skip auto-review on PRs that only edit this workflow file. The
    # `anthropics/claude-code-action@v1` action refuses to run when its
    # workflow file differs from the version on `main` (a security check that
    # prevents attackers from PRing malicious workflow edits and having the
    # action execute them under privileged context). On a single-developer
    # personal repo there's no attacker, but the action still self-fails with
    # exit 1 every time, leaving a recurring red ✗ on every workflow-edit PR.
    # `paths-ignore` short-circuits the trigger so the workflow doesn't run at
    # all on those PRs. Comment-driven `@claude` invocations still fire (they're
    # on the `issue_comment` trigger below) to review a workflow-edit PR.
    paths-ignore:
      - '.github/workflows/claude-review.yml'
  issue_comment:
    types: [created]

# Workflow-level default: read-only. The review-and-merge job below overrides
# with the write scopes the action actually needs (contents, pull-requests,
# issues, id-token). Defining the workflow default explicitly so any future job
# added here inherits a minimum-privilege baseline rather than the implicit
# Actions default.
permissions:
  contents: read

concurrency:
  # Scope by EVENT TYPE. Without this, a bot comment (issue_comment — e.g.
  # vercel[bot]'s preview-deploy comment, which lands on every PR) shares the
  # same group as the pull_request review run and, with cancel-in-progress,
  # CANCELS it mid-flight ("Set up job: cancelled") before it can merge. Observed
  # directly: a vercel[bot] comment killed the review run ~2s after it started.
  # Including event_name keeps comment events in their own group; within an event
  # type, cancel-in-progress still supersedes a stale run (a new push cancels an
  # older review of the same PR).
  group: claude-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review-and-merge:
    # Loop-prevention identity: the action's push-back commits resolve to
    # `github-actions[bot]` (the same login the working siblings guard on), so the
    # two guards below skip when this workflow authored the last commit. NOTE: GitHub
    # auth is now the OIDC Claude App token (no `github_token` — see the action step),
    # which runs in trusted mode. If the App's push-back ever appears under a
    # different login (e.g. `claude[bot]`), update BOTH guards to match — verify on
    # the first auto-fix push.
    #
    # TRUST GATE (pull_request path): run only on PRs whose head branch lives in
    # THIS repo (head.repo.full_name == github.repository) — i.e. created by a
    # write-access user, never an outside fork. That is the exact security
    # property the privileged SHA-pinned checkout needs, and it is independent of
    # org-membership visibility.
    #
    # WHY NOT author_association: it was `== OWNER || MEMBER`, but the Actions
    # EVENT payload only reports MEMBER for PUBLIC org members. The operator's
    # membership in this org is PRIVATE, so the payload reported a lesser
    # association, the if was always false, and review-and-merge was SKIPPED on
    # every PR — the auto-merge never ran (all PRs were merged by hand). Evidence:
    # GET /orgs/craigoley/public_members/<user> -> 404 (private) while the
    # authenticated REST API reads MEMBER. The same-repo check is not subject to
    # that visibility quirk. (The issue_comment path below still uses
    # author_association and has the same latent limitation — out of scope here;
    # it is not part of the hands-off auto-merge pipeline.)
    #
    # draft == false preserves the DRAFT GATE: draft PRs are neither reviewed nor
    # merged. Marking a draft "Ready for review" fires ready_for_review (see the
    # trigger above), flips draft to false, and lets the run proceed.
    #
    # Dependabot PRs are SKIPPED — deliberate fleet deviation from ClawApp: a
    # Next.js / dependency bump can pass tsc, jest, CodeQL and OSV yet still break
    # the render and auto-deploy to the public site, so dependency bumps get
    # human review. github-actions[bot] is skipped to prevent self-loops on
    # Claude's push-backs.
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.user.login != 'dependabot[bot]' &&
       github.event.pull_request.user.login != 'github-actions[bot]' &&
       !contains(github.event.pull_request.head.ref, 'claude-fix'))
      ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER') &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Check last commit author
        id: check-author
        if: github.event_name == 'pull_request'
        run: |
          # The action's push-back commits resolve to `github-actions[bot]` (same
          # as the working siblings). If the workflow authored the last commit we
          # skip, so Claude's own push-backs don't re-trigger an endless loop.
          # (Watch-point: if the OIDC App push ever lands as a different login,
          # update this check and the job `if:` above to match — see job comment.)
          AUTHOR=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json commits --jq '.commits[-1].authors[0].login // ""')
          if [[ "$AUTHOR" == "github-actions[bot]" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Exit if the workflow authored the last commit
        if: steps.check-author.outputs.skip == 'true'
        run: |
          echo "Last commit was by github-actions[bot] (this workflow) — skipping to prevent loop."
          exit 0

      # Resolve the PR head SHA from the API at trigger time so the subsequent
      # checkout pins to an immutable commit instead of a mutable branch ref.
      # Guards against an Untrusted-Checkout TOCTOU: without it, someone who can
      # push to the PR branch could force-push between the author check above and
      # the checkout, running their code under privileged context.
      - name: Resolve PR head SHA and branch
        id: pr-sha
        if: steps.check-author.outputs.skip != 'true'
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid,headRefName)
          SHA=$(echo "$PR_JSON" | jq -r .headRefOid)
          BRANCH=$(echo "$PR_JSON" | jq -r .headRefName)
          if [[ -z "$SHA" || "$SHA" == "null" ]]; then
            echo "Could not resolve head SHA for PR #$PR_NUMBER" >&2
            exit 1
          fi
          if [[ -z "$BRANCH" || "$BRANCH" == "null" ]]; then
            echo "Could not resolve head branch for PR #$PR_NUMBER" >&2
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      # Privileged checkout, reachable from the issue_comment trigger. CodeQL
      # may flag this (actions/untrusted-checkout); the sanitizers are in place:
      #   1. the job-level `if:` requires author_association in (OWNER, MEMBER)
      #      AND, for comments, an `@claude` body — only the owner can fire it.
      #   2. `ref:` is the resolved-at-trigger-time head SHA, not the mutable
      #      branch ref, so a force-push after the trust check can't swap it out.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        if: steps.check-author.outputs.skip != 'true'
        with:
          # SHA-pinned (immutable). NOT `head.ref` — branch refs are mutable and
          # race the `Check last commit author` step above.
          ref: ${{ steps.pr-sha.outputs.sha }}
          fetch-depth: 0

      # Re-attach HEAD to a named local branch matching the PR's head branch.
      # actions/checkout@v6 leaves a detached HEAD when given a SHA, and the
      # action's push-back code is most portable pushing from a named local
      # branch with a matching upstream. If the remote branch was force-pushed
      # since we resolved the SHA, the push is rejected as non-fast-forward —
      # the desired fail-closed behavior.
      - name: Re-attach HEAD to PR branch for push-back
        if: steps.check-author.outputs.skip != 'true'
        # PR head ref names are caller-controlled and could contain shell
        # metacharacters. Pass through env rather than `${{ … }}` interpolation
        # so bash sees the literal string via `$BRANCH` (guards code injection).
        env:
          BRANCH: ${{ steps.pr-sha.outputs.branch }}
        run: |
          git checkout -B "$BRANCH"
          git branch --set-upstream-to="origin/$BRANCH" "$BRANCH" 2>/dev/null || true

      # --- NO environment setup steps (matches the working siblings) ---
      # No "Set up pnpm / Set up Node / Install dependencies": the job goes
      # checkout → re-attach → action directly, like the siblings (which need none —
      # the runner ships Node + npm). The auto-merge thrash was NOT the env (that #45
      # hypothesis was FALSIFIED) — it was a stale `claude-code-action` SHA, fixed in
      # #47 (#48/#49 then auto-merged hands-off, denials=0).
      #
      # FIX-PUSH validation is by CI, not by this step: a reviewer-pushed fix is gated
      # by the REQUIRED `verify` job (ci.yml — tsc + test + lint, with its OWN pnpm
      # install), which runs on the pushed commit and blocks the merge if red. So the
      # Fix Phase does NOT need pnpm on PATH here (see the prompt's Fix Phase). The
      # review → merge happy path needs no setup either (diff via gh pr / Read,
      # comment via mcp, merge via gh pr).

      # HANDS-OFF FIX + MERGE (PR6): the gates (npx tsc --noEmit, pnpm test, pnpm
      # lint) are green on main and the `verify` CI check enforces them, so the
      # reviewer now fixes-to-green and merges. --allowedTools (below) MATCHES the
      # working sibling list (neon-drift / rogue-descent), pnpm-adapted: Edit,
      # Write, Bash(git:*), Bash(gh pr:*), Bash(gh api:*), Bash(pnpm lint:*). The
      # `gh api` grant is load-bearing — the action's review/merge flow calls the
      # GitHub API under the hood; #38 dropped it and the reviewer thrashed to the
      # turn cap on denied gh-api calls (PR #39: error_max_turns, 42 denials, no
      # merge). The failure-dump + is_error steps after this one capture the actual
      # denied tools and fail the check on any error, so a broken run is never
      # hollow-green or a silent no-merge. Branch protection requires only the
      # deterministic checks (verify / Analyze / Vercel), NOT this job — a
      # flaky-action day means merge-by-hand, not repo-lockout.
      - id: claude
        # Pinned to the commit the WORKING siblings (rogue-descent + neon-drift) use,
        # which runs with permission_denials_count=0 and auto-merges. Our previous pin
        # (@2fee1551, Claude Code 2.1.185) had a claude_args whitespace-split bug
        # (issue #844) that shredded the space-containing --allowedTools Bash patterns
        # → denials → thrash. NOTE this is a DOWNGRADE: @d5726de0 (2.1.177) is the
        # last-known-good; the bug is a regression in the newer release. A future
        # forward-bump must re-verify denials=0 before adopting.
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342  # v1
        if: steps.check-author.outputs.skip != 'true'
        with:
          # Anthropic model auth (OAuth via Craig's Max subscription) — same auth
          # ClawApp uses. This is a SEPARATE axis from GitHub auth below; keep it.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # GitHub auth: intentionally NO `github_token` input. Omitting it makes
          # the action mint a Claude Code GitHub App token via the OIDC exchange
          # (the App is now installed on this repo; the job's `id-token: write` is
          # what that exchange requires). The App token runs the action in TRUSTED
          # mode, where --allowedTools (below) is HONORED. Passing the default
          # GITHUB_TOKEN instead (OVERRIDE_GITHUB_TOKEN) forced UNTRUSTED mode,
          # which DISCARDS --allowedTools and denied every Bash tool → the
          # auto-merge thrash in #39/#40/#41 (confirmed via the failure telemetry).
          # Matches the working siblings, which pass only claude_code_oauth_token.
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
            BRANCH: ${{ github.event.pull_request.head.ref || github.head_ref }}

            You are the code reviewer for Word Archipelago (package name
            `word-isles`), a word-puzzle game built with Next.js (App Router) +
            React 19 + Redux Toolkit, using pnpm, and deployed to Vercel. Your job
            in THIS PR is to review it, fix what you safely can, and — if it meets
            the bar — merge it hands-off.

            ## Gates are green — and CI enforces them

            All three gates are GREEN on main: `npx tsc --noEmit` (0 errors),
            `pnpm test` (90/90), `pnpm lint` (0 problems). The required `verify` CI
            check runs all three (with its own install) on every pushed commit and
            is the AUTHORITATIVE gate — if a fix breaks any gate, `verify` goes red
            and the PR will not merge. You do NOT need to run the full suite in this
            step (pnpm may not be on PATH here); see Fix Phase.

            ## Review Phase

            Review the full diff. Post findings as inline review comments.

            ### Project hard rules — flag any violation immediately

            **1. Purity of the logic layer (THE load-bearing rule)**
            `lib/services/` and `lib/slices/` are pure TypeScript and MUST NOT
            import React or touch the DOM (`window`, `document`, `localStorage`,
            React hooks/components, event listeners). Reducers and selectors must
            stay pure — same inputs, same outputs, no side effects. Flag any
            React or DOM import, or any side effect, added under `lib/services/`
            or `lib/slices/`. (React-bound code belongs in `components/` and
            `lib/hooks/`.)

            **2. No magic numbers**
            Flag numeric literals used as tuning/gameplay/dimension values inline
            in logic or components instead of being named constants (loop indices,
            0/1 identities and obvious math constants are fine).

            **3. TypeScript strict — no implicit any**
            Flag implicit `any`, unsafe casts (`as any`, non-null `!` that hides a
            real nullable), and types that defeat strict mode.

            ### Also review for
            - Correctness: logic errors, off-by-one, broken edge cases, regressions
            - Whether all callers of a changed function/type were updated
            - Swallowed errors, dead code, duplicated logic

            ### What to ignore
            - Style/formatting (prettier/eslint territory)
            - TODO/FIXME comments (intentional)
            - Lock files, generated files, build artifacts
            - Test code that intentionally exercises edge cases
            - Pre-existing tsc/test failures unrelated to this PR's diff

            ## Fix Phase

            If you find issues you can safely fix:
            1. Fix them directly in the code on the PR branch.
            2. Commit with a clear message and push to the PR branch. The required
               `verify` CI check (tsc + test + lint, with its own pnpm install) then
               runs on your pushed commit and GATES the merge — a fix that breaks any
               gate turns `verify` red and the PR will not merge. So you do NOT need
               to run the full suite locally here (pnpm may not be on PATH in this
               step). You MAY run `npx tsc --noEmit` for a quick type sanity-check
               (npx needs no setup), but `verify` is the authoritative validation.
            3. Re-review your own fixes to confirm they're correct.

            ## Merge Phase

            After review (and any fixes), if the PR meets quality standards:
            1. Post a brief summary comment noting what you reviewed and any fixes.
            2. Approve the PR.
            3. Enable auto-merge with:
               `gh pr merge <number> --squash --delete-branch --auto`
               `--auto` is REQUIRED here: main has branch protection, so the merge
               is queued and GitHub completes it once the required checks
               (verify, Analyze, scan-pr / osv-scan, Dependency review, Vercel)
               pass. If you pushed fixes, those checks re-run on your commit first.

            If the PR has fundamental issues that can't be auto-fixed (wrong
            approach, needs architectural discussion, missing tests for complex new
            features), post a detailed comment explaining the concerns, do NOT
            enable auto-merge, and tag @craigoley so I see it.

          claude_args: |
            --model claude-opus-4-6
            --max-turns 50
            --allowedTools Edit,Write,Read,Bash(git:*),Bash(gh pr:*),Bash(gh api:*),Bash(npx tsc:*),Bash(pnpm test:*),Bash(pnpm lint:*),mcp__github_inline_comment__create_inline_comment

      # FAILURE TELEMETRY: the execution_file is ephemeral on the runner and the
      # streamed log does NOT contain the per-denial tool names (only a count), so
      # past thrashes (PR #39) could only be inferred. This step prints the result
      # summary + the ACTUAL denied tool calls. `if: always()` so it runs even when
      # the action hard-fails — that is exactly the case we keep being unable to
      # inspect. It never fails the job itself (telemetry only; exits 0).
      - name: Dump claude-code-action execution telemetry
        if: always() && steps.check-author.outputs.skip != 'true'
        env:
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          FILE="${EXEC_FILE:-$RUNNER_TEMP/claude-execution-output.json}"
          if [[ ! -f "$FILE" ]]; then
            echo "No execution file at '$FILE' — nothing to dump."
            exit 0
          fi
          echo "::group::result summary"
          jq -r '[.[] | select(.type=="result")] | last
                 | "subtype=\(.subtype)  is_error=\(.is_error)  num_turns=\(.num_turns)  permission_denials_count=\(.permission_denials_count // 0)  cost_usd=\(.total_cost_usd // 0)"' "$FILE" 2>/dev/null || echo "(could not parse result message)"
          echo "::endgroup::"
          echo "::group::permission denials (actual denied tool calls)"
          # Structured permission_denials array, if this action version emits one.
          jq -r '[.[] | select(.type=="result")] | last | .permission_denials // [] | .[]
                 | "DENIED tool=\(.tool_name // .name // "?")  input=\(((.tool_input // .input) // {}) | tostring | .[0:200])"' "$FILE" 2>/dev/null || true
          # Fallback: tool_result entries flagged is_error (denials surface here).
          jq -r '.[] | select(.type=="user") | (.message.content // [])[]?
                 | select((.type=="tool_result") and (.is_error == true))
                 | "ERROR tool_result: \((.content | tostring) | .[0:200])"' "$FILE" 2>/dev/null || true
          echo "::endgroup::"
          exit 0

      # Durable copy of the full execution log so a future thrash is analyzable
      # offline (the streamed run log truncates large JSON). Never fails the job.
      - name: Upload claude-code-action execution log
        if: always() && steps.check-author.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: claude-execution-output
          path: ${{ steps.claude.outputs.execution_file }}
          if-no-files-found: ignore
          retention-days: 14

      # is_error FAIL-SAFE (hardening beyond the sibling baseline — siblings have
      # none). The action can exit 0 yet have errored internally (the documented
      # error_max_turns / error_during_execution / broken-install modes). Left
      # unchecked that is a HOLLOW-GREEN run or a SILENT no-merge. Parse the
      # execution log's final result message and fail the job unless is_error is
      # explicitly false — any error, or a missing/malformed result, fails LOUDLY.
      # `if: always()` makes this the CANONICAL verdict in every path — including
      # when the action hard-fails first (in #39 it was skipped, so the action's
      # own exit-1 was the only signal). review-and-merge is NOT a required check,
      # so this red never locks the repo; it surfaces a broken run for a manual
      # look (admin escape hatch).
      - name: Fail the check if the action errored (no hollow-green / no silent no-merge)
        if: always() && steps.check-author.outputs.skip != 'true'
        env:
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [[ -z "$EXEC_FILE" || ! -f "$EXEC_FILE" ]]; then
            echo "::error::claude-code-action produced no execution_file — treating as a failed run."
            exit 1
          fi
          # The execution log is a JSON array of SDK messages; the final
          # {type:"result"} entry carries is_error + subtype (success,
          # error_max_turns, error_during_execution, ...).
          IS_ERROR=$(jq -r '[.[] | select(.type=="result")] | last | .is_error' "$EXEC_FILE" 2>/dev/null)
          SUBTYPE=$(jq -r '[.[] | select(.type=="result")] | last | .subtype // "unknown"' "$EXEC_FILE" 2>/dev/null)
          echo "claude-code-action result: is_error=$IS_ERROR subtype=$SUBTYPE"
          if [[ "$IS_ERROR" != "false" ]]; then
            echo "::error::claude-code-action did not complete cleanly (is_error=$IS_ERROR, subtype=$SUBTYPE) — failing the check."
            exit 1
          fi
