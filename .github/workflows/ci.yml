name: CI

# Deterministic quality gate: typecheck + tests + lint. Runs on every PR and on
# push to main. The push-to-main run is what makes the `verify` check appear on
# the protected branch, which is the prerequisite for marking it a REQUIRED status
# check in branch protection (GitHub only offers checks that have run on the
# branch). Branch protection / auto-merge are configured in a later PR, not here.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: this job only reads the repo and runs read-only checks.
permissions:
  contents: read

# Cancel superseded runs for the same ref so rapid pushes don't pile up runners —
# only the newest commit's result matters.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single job with a STABLE, UNIQUE name (`verify`) so branch protection has one
  # unambiguous check to require later. Deliberately not "review-and-merge"
  # (claude-review.yml) or any other workflow's job name. The three checks run in
  # sequence and each GATES (no continue-on-error) — all three are green on main.
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # pnpm before Node: `cache: pnpm` below needs pnpm on PATH to resolve the
      # store. No `version:` — pnpm/action-setup reads it from package.json
      # `packageManager` (pnpm@10.34.4), the single source of truth.
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint
