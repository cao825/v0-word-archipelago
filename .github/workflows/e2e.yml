name: E2E (Playwright)

# Playwright end-to-end smoke — SEPARATE from the CI lint/test/build gates and from
# claude-review auto-merge (which only runs `pnpm test` = jest). NON-BLOCKING: this is
# NOT in branch-protection required checks (the 4 required are verify / Analyze /
# Vercel / Semgrep arch-invariants). e2e can be flakier than unit tests, so it proves
# itself stable here first; promote to required in a follow-up only if warranted.
#
# Boots the BUILT production app (playwright.config webServer: pnpm build && pnpm start)
# and drives the real DOM (load/start flow, controls, score bar) + the leaderboard API
# contract. The Redis-backed happy path skips without KV creds (CI has none).
#
# Ported from the rogue-descent fleet e2e workflow, adapted to pnpm + SHA-pinned actions
# (the WebGL screenshot-baseline job is N/A for this DOM game).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Chromium + its OS deps (the browser version is pinned via @playwright/test in the lockfile).
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
